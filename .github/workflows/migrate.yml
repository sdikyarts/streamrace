name: Migrate

on:
  push:
    branches:
      - staging
      - main

permissions:
  contents: read

jobs:
  migrate:
    name: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DATABASE_URL_STAGING: ${{ secrets.DATABASE_URL_STAGING }}
          DIRECT_DATABASE_URL_STAGING: ${{ secrets.DIRECT_DATABASE_URL_STAGING }}
          NO_COLOR: "1"
          FORCE_COLOR: "0"
        shell: bash
        run: |
          npm run db:migrate > /tmp/migrate.log 2>&1
          exit_code=$?
          sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' /tmp/migrate.log | tr '\r' '\n'
          exit $exit_code
